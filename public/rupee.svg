<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep navy to teal -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f2444"/>
      <stop offset="100%" stop-color="#0a1a30"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="80" y1="80" x2="432" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0f4c75"/>
    </linearGradient>
    <!-- Symbol gradient -->
    <linearGradient id="symGrad" x1="160" y1="140" x2="360" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b2f5ea"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#00d4aa" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <circle cx="80" cy="80" r="3" fill="white"/>
    <circle cx="160" cy="80" r="3" fill="white"/>
    <circle cx="240" cy="80" r="3" fill="white"/>
    <circle cx="320" cy="80" r="3" fill="white"/>
    <circle cx="400" cy="80" r="3" fill="white"/>
    <circle cx="80" cy="160" r="3" fill="white"/>
    <circle cx="160" cy="160" r="3" fill="white"/>
    <circle cx="240" cy="160" r="3" fill="white"/>
    <circle cx="320" cy="160" r="3" fill="white"/>
    <circle cx="400" cy="160" r="3" fill="white"/>
    <circle cx="80" cy="240" r="3" fill="white"/>
    <circle cx="160" cy="240" r="3" fill="white"/>
    <circle cx="320" cy="240" r="3" fill="white"/>
    <circle cx="400" cy="240" r="3" fill="white"/>
    <circle cx="80" cy="320" r="3" fill="white"/>
    <circle cx="160" cy="320" r="3" fill="white"/>
    <circle cx="240" cy="320" r="3" fill="white"/>
    <circle cx="320" cy="320" r="3" fill="white"/>
    <circle cx="400" cy="320" r="3" fill="white"/>
    <circle cx="80" cy="400" r="3" fill="white"/>
    <circle cx="160" cy="400" r="3" fill="white"/>
    <circle cx="240" cy="400" r="3" fill="white"/>
    <circle cx="320" cy="400" r="3" fill="white"/>
    <circle cx="400" cy="400" r="3" fill="white"/>
  </g>

  <!-- Glowing circle behind the symbol -->
  <circle cx="256" cy="256" r="168" fill="url(#cardGrad)" filter="url(#shadow)" opacity="0.18"/>

  <!-- Main card shape -->
  <rect x="88" y="88" width="336" height="336" rx="80" fill="url(#cardGrad)" filter="url(#shadow)"/>

  <!-- Card shine overlay -->
  <rect x="88" y="88" width="336" height="168" rx="80" fill="white" opacity="0.07"/>
  <rect x="88" y="88" width="336" height="80" rx="80" fill="white" opacity="0.05"/>

  <!-- Rupee ₹ symbol, scaled to fill the card nicely -->
  <!-- Based on Bootstrap Icons currency-rupee, scaled from 16x16 to ~240x240, centered at 256,256 -->
  <g transform="translate(136, 136) scale(15)" filter="url(#glow)">
    <path d="M4 3.06h2.726c1.22 0 2.12.575 2.325 1.724H4v1.051h5.051C8.855 7.001 8 7.558 6.788 7.558H4v1.317L8.437 14h2.11L6.095 8.884h.855c2.316-.018 3.465-1.476 3.688-3.049H12V4.784h-1.345c-.08-.778-.357-1.335-.793-1.732H12V2H4z"
      fill="url(#symGrad)" stroke="none"/>
  </g>
</svg>
